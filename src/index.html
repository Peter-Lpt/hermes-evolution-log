<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermes 进化日志</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧬</text></svg>">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1a2233;
            --border: #1e293b;
            --text: #e2e8f0;
            --text-dim: #94a3b8;
            --text-muted: #64748b;
            --accent: #f59e0b;
            --accent-dim: rgba(245, 158, 11, 0.12);
            --green: #22c55e;
            --green-bg: rgba(34, 197, 94, 0.1);
            --blue: #3b82f6;
            --blue-bg: rgba(59, 130, 246, 0.1);
            --amber: #f59e0b;
            --amber-bg: rgba(245, 158, 11, 0.1);
            --purple: #a855f7;
            --purple-bg: rgba(168, 85, 247, 0.1);
            --gold: #eab308;
            --gray-tag: #475569;
            --radius: 10px;
            --radius-sm: 6px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 24px 20px 80px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .header-icon {
            font-size: 32px;
            line-height: 1;
        }
        .header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header h1 span {
            color: var(--text-dim);
            font-weight: 400;
            font-size: 14px;
            margin-left: 10px;
        }

        /* ── Stats Bar ── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            transition: border-color 0.2s;
        }
        .stat-card:hover {
            border-color: var(--accent);
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1.2;
        }
        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* ── Main Tabs ── */
        .tab-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 4px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: transparent;
            color: var(--text-dim);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn:hover {
            color: var(--text);
            background: rgba(255,255,255,0.04);
        }
        .tab-btn.active {
            background: var(--accent-dim);
            color: var(--accent);
        }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Filters ── */
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }
        .filter-group {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
        }
        .filter-group-label {
            font-size: 12px;
            color: var(--text-muted);
            align-self: center;
            margin-right: 4px;
            white-space: nowrap;
        }
        .filter-btn {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-dim);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .filter-btn:hover {
            border-color: var(--text-dim);
            color: var(--text);
        }
        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
            font-weight: 600;
        }
        .filter-sep {
            width: 1px;
            background: var(--border);
            margin: 0 4px;
            align-self: stretch;
        }

        /* ── Sub-tabs (skills) ── */
        .sub-tab-bar {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
        }
        .sub-tab-btn {
            padding: 8px 18px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: transparent;
            color: var(--text-dim);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sub-tab-btn:hover {
            border-color: var(--text-dim);
            color: var(--text);
        }
        .sub-tab-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #000;
        }
        .sub-panel { display: none; }
        .sub-panel.active { display: block; }

        /* ── Timeline (进化记录) ── */
        .timeline-group { margin-bottom: 28px; }
        .timeline-date {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0 0 10px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .event-card {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            padding: 14px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 8px;
            transition: border-color 0.2s, background 0.2s;
        }
        .event-card:hover {
            border-color: rgba(245, 158, 11, 0.3);
            background: var(--bg-card-hover);
        }
        .event-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .event-icon.created { background: var(--green-bg); border: 1px solid rgba(34,197,94,0.25); }
        .event-icon.evolved { background: var(--blue-bg); border: 1px solid rgba(59,130,246,0.25); }
        .event-icon.modeling { background: var(--amber-bg); border: 1px solid rgba(245,158,11,0.25); }
        .event-icon.memory { background: var(--purple-bg); border: 1px solid rgba(168,85,247,0.25); }
        .event-body { flex: 1; min-width: 0; }
        .event-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px;
        }
        .event-desc {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .event-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 8px;
            align-items: center;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 500;
        }
        .tag-category {
            background: rgba(255,255,255,0.06);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .tag-source-user {
            background: rgba(234, 179, 8, 0.1);
            color: var(--gold);
            border: 1px solid rgba(234, 179, 8, 0.2);
        }
        .tag-source-system {
            background: rgba(71, 85, 105, 0.2);
            color: var(--gray-tag);
            border: 1px solid rgba(71, 85, 105, 0.3);
        }
        .event-time {
            font-size: 12px;
            color: var(--text-muted);
            margin-left: auto;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
        .empty-state p { font-size: 14px; }

        /* ── Skill Categories ── */
        .category-group { margin-bottom: 24px; }
        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
            user-select: none;
        }
        .category-header:hover {
            border-color: rgba(245, 158, 11, 0.3);
        }
        .category-header.fixed {
            cursor: default;
        }
        .category-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
        }
        .category-count {
            font-size: 12px;
            color: var(--text-muted);
            background: rgba(255,255,255,0.05);
            padding: 2px 8px;
            border-radius: 10px;
        }
        .category-chevron {
            font-size: 12px;
            color: var(--text-muted);
            transition: transform 0.25s;
        }
        .category-header.collapsed .category-chevron {
            transform: rotate(-90deg);
        }
        .category-body {
            overflow: hidden;
            transition: max-height 0.3s ease;
        }
        .category-body.collapsed {
            max-height: 0 !important;
        }

        .skill-card {
            padding: 12px 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            transition: border-color 0.2s, background 0.2s;
        }
        .skill-card:hover {
            border-color: rgba(245, 158, 11, 0.2);
            background: var(--bg-card-hover);
        }
        .skill-name {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .skill-desc {
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .usage-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            padding: 1px 7px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid rgba(245, 158, 11, 0.2);
            flex-shrink: 0;
        }

        /* ── Loading / Error ── */
        .loading {
            text-align: center;
            padding: 80px 20px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading p { color: var(--text-muted); font-size: 14px; }
        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: #ef4444;
            font-size: 14px;
        }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .stats-bar { grid-template-columns: repeat(2, 1fr); }
            .header h1 { font-size: 18px; }
            .header h1 span { display: block; margin-left: 0; margin-top: 4px; }
            .filters { gap: 6px; }
            .filter-sep { display: none; }
            .event-meta { gap: 4px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="loading">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>
    </div>
    <script>
    (function() {
        const APP = document.getElementById('app');
        let DATA = null;

        // ── Helpers ──
        const TYPE_MAP = {
            skill_created:  { icon: '🆕', label: '新增', cls: 'created', color: 'var(--green)' },
            skill_evolved:  { icon: '🔄', label: '进化', cls: 'evolved', color: 'var(--blue)' },
            user_modeling:  { icon: '🧑', label: '建模', cls: 'modeling', color: 'var(--amber)' },
            memory_changed: { icon: '🧠', label: '记忆', cls: 'memory',   color: 'var(--purple)' },
        };

        function fmtTime(ts) {
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return pad(d.getHours()) + ':' + pad(d.getMinutes());
        }
        function fmtDate(ts) {
            const d = new Date(ts);
            const y = d.getFullYear();
            const m = d.getMonth() + 1;
            const dd = d.getDate();
            return y + '-' + String(m).padStart(2,'0') + '-' + String(dd).padStart(2,'0');
        }
        function isToday(d) { const t = new Date(); return fmtDate(d) === fmtDate(t); }
        function isYesterday(d) {
            const t = new Date(); t.setDate(t.getDate() - 1);
            return fmtDate(d) === fmtDate(t);
        }
        function isThisWeek(d) {
            const now = new Date(); const t = new Date(d);
            const start = new Date(now); start.setDate(now.getDate() - ((now.getDay() + 6) % 7)); start.setHours(0,0,0,0);
            return t >= start;
        }
        function isThisMonth(d) {
            const now = new Date(); const t = new Date(d);
            return t.getFullYear() === now.getFullYear() && t.getMonth() === now.getMonth();
        }
        function truncate(s, n) {
            return s && s.length > n ? s.slice(0, n) + '…' : s;
        }

        // ── Fetch ──
        fetch('data/evolution.json')
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(data => { DATA = data; render(); })
            .catch(err => {
                APP.innerHTML = '<div class="error-msg">⚠️ 数据加载失败: ' + err.message + '</div>';
            });

        // ── Render ──
        function render() {
            const s = DATA.stats || {};
            APP.innerHTML = '';

            // Header
            APP.innerHTML += `
                <div class="header">
                    <div class="header-icon">🧬</div>
                    <h1>Hermes 进化日志<span>Hermes Evolution Log</span></h1>
                </div>`;

            // Stats
            const statsHtml = `
                <div class="stats-bar">
                    <div class="stat-card"><div class="stat-value">${s.total_skills ?? '—'}</div><div class="stat-label">技能总数</div></div>
                    <div class="stat-card"><div class="stat-value">${s.user_skills ?? '—'}</div><div class="stat-label">用户技能</div></div>
                    <div class="stat-card"><div class="stat-value">${s.used_skills ?? '—'}</div><div class="stat-label">已使用</div></div>
                    <div class="stat-card"><div class="stat-value">${s.total_events ?? '—'}</div><div class="stat-label">进化记录</div></div>
                </div>`;
            APP.innerHTML += statsHtml;

            // Main Tabs
            const tabBar = document.createElement('div');
            tabBar.className = 'tab-bar';
            tabBar.innerHTML = `
                <button class="tab-btn active" data-tab="timeline">🧬 进化记录</button>
                <button class="tab-btn" data-tab="skills">📦 技能图谱</button>`;
            APP.appendChild(tabBar);

            // Tab panels
            const timelinePanel = document.createElement('div');
            timelinePanel.className = 'tab-panel active';
            timelinePanel.id = 'panel-timeline';
            const skillsPanel = document.createElement('div');
            skillsPanel.className = 'tab-panel';
            skillsPanel.id = 'panel-skills';
            APP.appendChild(timelinePanel);
            APP.appendChild(skillsPanel);

            // Tab switching
            tabBar.addEventListener('click', function(e) {
                const btn = e.target.closest('.tab-btn');
                if (!btn) return;
                tabBar.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                APP.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
            });

            renderTimeline(timelinePanel);
            renderSkills(skillsPanel);
        }

        // ── Tab 1: Timeline ──
        function renderTimeline(panel) {
            const events = DATA.events || [];
            if (!events.length) {
                panel.innerHTML = `
                    <div class="filters"><div class="filter-group" id="tf-time"></div></div>
                    <div class="empty-state"><div class="icon">📭</div><p>暂无进化记录</p></div>`;
                return;
            }

            let currentTime = 'all';
            let currentType = 'all';

            // Build filters
            const filtersHtml = `
                <div class="filters">
                    <div class="filter-group" id="tf-time">
                        <span class="filter-group-label">时间</span>
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="today">今天</button>
                        <button class="filter-btn" data-filter="yesterday">昨天</button>
                        <button class="filter-btn" data-filter="week">本周</button>
                        <button class="filter-btn" data-filter="month">本月</button>
                    </div>
                    <div class="filter-sep"></div>
                    <div class="filter-group" id="tf-type">
                        <span class="filter-group-label">类型</span>
                        <button class="filter-btn active" data-filter="all">全部</button>
                        <button class="filter-btn" data-filter="skill_created">🆕 新增</button>
                        <button class="filter-btn" data-filter="skill_evolved">🔄 进化</button>
                        <button class="filter-btn" data-filter="user_modeling">🧑 建模</button>
                        <button class="filter-btn" data-filter="memory_changed">🧠 记忆</button>
                    </div>
                </div>
                <div id="timeline-list"></div>`;
            panel.innerHTML = filtersHtml;

            const listEl = document.getElementById('timeline-list');
            const tfTime = document.getElementById('tf-time');
            const tfType = document.getElementById('tf-type');

            function filterEvents() {
                let filtered = events;
                if (currentTime !== 'all') {
                    const fn = { today: isToday, yesterday: isYesterday, week: isThisWeek, month: isThisMonth }[currentTime];
                    if (fn) filtered = filtered.filter(e => fn(new Date(e.timestamp)));
                }
                if (currentType !== 'all') {
                    filtered = filtered.filter(e => e.type === currentType);
                }
                return filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            }

            function renderList() {
                const filtered = filterEvents();
                if (!filtered.length) {
                    listEl.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>无匹配记录</p></div>';
                    return;
                }

                // Group by date
                const groups = {};
                filtered.forEach(ev => {
                    const d = fmtDate(ev.timestamp);
                    (groups[d] = groups[d] || []).push(ev);
                });

                let html = '';
                Object.keys(groups).sort((a, b) => b.localeCompare(a)).forEach(date => {
                    const dt = new Date(date + 'T12:00:00');
                    const weekday = ['周日','周一','周二','周三','周四','周五','周六'][dt.getDay()];
                    html += `<div class="timeline-group">
                        <div class="timeline-date">${date} ${weekday}</div>`;
                    groups[date].forEach(ev => {
                        const tm = TYPE_MAP[ev.type] || { icon: '?', label: ev.type, cls: 'created', color: 'var(--text-dim)' };
                        const srcTag = ev.source
                            ? (ev.source === 'user'
                                ? '<span class="tag tag-source-user">👤 用户</span>'
                                : '<span class="tag tag-source-system">⚙️ 系统</span>')
                            : '';
                        const catTag = ev.category ? `<span class="tag tag-category">${ev.category}</span>` : '';
                        const skillName = ev.data?.skill_name || ev.data?.skill || '';
                        const desc = ev.data?.description || '';
                        html += `
                        <div class="event-card">
                            <div class="event-icon ${tm.cls}">${tm.icon}</div>
                            <div class="event-body">
                                <div class="event-name">${esc(skillName)}</div>
                                <div class="event-desc">${esc(desc)}</div>
                                <div class="event-meta">
                                    ${catTag}${srcTag}
                                    <span class="event-time">${fmtTime(ev.timestamp)}</span>
                                </div>
                            </div>
                        </div>`;
                    });
                    html += '</div>';
                });
                listEl.innerHTML = html;
            }

            tfTime.addEventListener('click', function(e) {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;
                tfTime.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentTime = btn.dataset.filter;
                renderList();
            });
            tfType.addEventListener('click', function(e) {
                const btn = e.target.closest('.filter-btn');
                if (!btn) return;
                tfType.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentType = btn.dataset.filter;
                renderList();
            });

            renderList();
        }

        // ── Tab 2: Skills ──
        function renderSkills(panel) {
            const ss = DATA.skills_summary || { used: {}, unused: {} };

            // Sub-tabs
            const subTabs = document.createElement('div');
            subTabs.className = 'sub-tab-bar';
            subTabs.innerHTML = `
                <button class="sub-tab-btn active" data-sub="user">👤 用户技能</button>
                <button class="sub-tab-btn" data-sub="system">📦 系统预装技能</button>`;
            panel.appendChild(subTabs);

            const userPanel = document.createElement('div');
            userPanel.className = 'sub-panel active';
            userPanel.id = 'sub-user';
            const sysPanel = document.createElement('div');
            sysPanel.className = 'sub-panel';
            sysPanel.id = 'sub-system';
            panel.appendChild(userPanel);
            panel.appendChild(sysPanel);

            subTabs.addEventListener('click', function(e) {
                const btn = e.target.closest('.sub-tab-btn');
                if (!btn) return;
                subTabs.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                panel.querySelectorAll('.sub-panel').forEach(p => p.classList.remove('active'));
                document.getElementById('sub-' + btn.dataset.sub).classList.add('active');
            });

            renderUsedSkills(userPanel, ss.used || {});
            renderUnusedSkills(sysPanel, ss.unused || {});
        }

        function renderUsedSkills(panel, used) {
            const cats = Object.keys(used);
            if (!cats.length) {
                panel.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无已使用的用户技能</p></div>';
                return;
            }
            let html = '';
            cats.sort().forEach(cat => {
                const skills = (used[cat] || []).sort((a, b) => (b.usage_count || 0) - (a.usage_count || 0));
                html += `<div class="category-group">
                    <div class="category-header fixed">
                        <span class="category-name">${esc(cat)}</span>
                        <span class="category-count">${skills.length}</span>
                    </div>
                    <div class="category-body">`;
                skills.forEach(sk => {
                    html += `
                    <div class="skill-card">
                        <div class="skill-name">
                            ${esc(sk.name)}
                            ${sk.usage_count > 0 ? `<span class="usage-badge">⚡ ${sk.usage_count}</span>` : ''}
                        </div>
                        <div class="skill-desc">${esc(sk.description || '')}</div>
                    </div>`;
                });
                html += '</div></div>';
            });
            panel.innerHTML = html;
        }

        function renderUnusedSkills(panel, unused) {
            const cats = Object.keys(unused);
            if (!cats.length) {
                panel.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>暂无系统预装技能</p></div>';
                return;
            }
            let html = '';
            cats.sort().forEach((cat, i) => {
                const skills = (unused[cat] || []).sort((a, b) => (b.usage_count || 0) - (a.usage_count || 0));
                const collapsedClass = i >= 0 ? '' : '';
                html += `<div class="category-group">
                    <div class="category-header" data-cat="${i}">
                        <span class="category-name">${esc(cat)}</span>
                        <span class="category-count">${skills.length}</span>
                        <span class="category-chevron">▼</span>
                    </div>
                    <div class="category-body${i >= 0 ? ' collapsed' : ''}" data-body="${i}">`;
                skills.forEach(sk => {
                    html += `
                    <div class="skill-card">
                        <div class="skill-name">${esc(sk.name)}</div>
                        <div class="skill-desc">${esc(truncate(sk.description || '', 120))}</div>
                    </div>`;
                });
                html += '</div></div>';
            });
            panel.innerHTML = html;

            // Collapse all by default — toggle on click
            panel.querySelectorAll('.category-header').forEach(hdr => {
                hdr.addEventListener('click', function() {
                    const key = hdr.dataset.cat;
                    const body = panel.querySelector('[data-body="' + key + '"]');
                    const chevron = hdr.querySelector('.category-chevron');
                    if (body.classList.contains('collapsed')) {
                        // expand
                        body.classList.remove('collapsed');
                        body.style.maxHeight = body.scrollHeight + 'px';
                        chevron.textContent = '▼';
                        // remove max-height after transition
                        setTimeout(() => { body.style.maxHeight = 'none'; }, 300);
                    } else {
                        // collapse
                        body.style.maxHeight = body.scrollHeight + 'px';
                        requestAnimationFrame(() => {
                            body.style.maxHeight = '0';
                            body.classList.add('collapsed');
                            chevron.textContent = '▶';
                        });
                    }
                });
            });
        }

        function esc(s) {
            if (!s) return '';
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }
    })();
    </script>
</body>
</html>
