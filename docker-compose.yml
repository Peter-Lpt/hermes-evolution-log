version: "3.8"

services:
  hermes-log:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-log
    ports:
      - "${PORT:-9912}:80"
    volumes:
      # Persist evolution data across rebuilds
      - ./data:/usr/share/nginx/html/data
      # Read-only access to hermes skills directory
      - ${HERMES_DIR:-$HOME/.hermes/skills}:/hermes/skills:ro
    restart: unless-stopped
